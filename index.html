<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOAP 의료기록 검역 터미널</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & Noto Sans KR -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tone.js for Web Audio synth effects -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <!-- html2canvas.js CDN for PNG Image Generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Firebase Compat core SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <!-- Firebase Compat Auth SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <!-- Firebase Compat Firestore SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background-color: #0b132b;
      color: #f1f5f9;
      user-select: none;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #1c2541;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 4px;
    }
    #gameBox {
      background-image: radial-gradient(#1c2541 1.2px, transparent 1.2px);
      background-size: 24px 24px;
    }
    /* Emergency Mode Neon flashing */
    .emergency-border {
      box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.7);
      border-color: #ef4444 !important;
      animation: emergency-pulse 1s infinite alternate;
    }
    @keyframes emergency-pulse {
      from { box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.4); }
      to { box-shadow: inset 0 0 25px rgba(239, 68, 68, 0.85); }
    }
    #certificate-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 210mm;
      background: #ffffff;
      color: #000000;
      z-index: -9999;
      opacity: 0.01; /* Minimal opacity to enforce painting rendering while avoiding screenshot transparency */
      pointer-events: none;
      overflow: hidden;
    }
    .pdf-compact-page {
      width: 210mm;
      min-height: 297mm;
      padding: 15mm 15mm;
      box-sizing: border-box;
      background: #ffffff;
      color: #000000;
      position: relative;
      page-break-after: always;
    }
    .pdf-compact-page:last-child {
      page-break-after: avoid;
    }
    .pdf-compact-page * {
      line-height: 1.35 !important;
    }
    .falling-capsule {
      will-change: transform;
      touch-action: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">

<header class="bg-[#111a36] border-b border-[#22315d] py-3 px-6 sticky top-0 z-50 shadow-md">
  <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="bg-gradient-to-tr from-[#3b82f6] to-[#10b981] p-2 rounded-xl shadow-lg shadow-blue-500/10">
        <i class="fa-solid fa-file-shield text-lg text-slate-950"></i>
      </div>
      <div>
        <h1 class="font-black text-lg tracking-tight text-white flex items-center gap-1.5">
          SOAP <span class="text-blue-400 font-bold text-xs bg-blue-950 px-2 py-0.5 rounded border border-blue-800">의료기록 검역 터미널</span>
        </h1>
        <p class="text-[10px] text-slate-400">오염 의료기록 실시간 여과 및 학습자 검역 자격증 세션</p>
      </div>
    </div>
    
    <div class="flex items-center flex-wrap gap-2.5">
      <div id="dbStatusBadge" class="text-[9px] px-2 py-0.5 rounded border font-semibold flex items-center gap-1 bg-amber-950/60 border-amber-800 text-amber-400">
        <i class="fa-solid fa-circle-nodes animate-pulse"></i>
        <span id="dbStatusText">상태 감지 중</span>
      </div>
      
      <button onclick="window.openGuideModal()" class="bg-[#1c2541] hover:bg-[#2d3a63] border border-blue-500/30 text-blue-300 px-3 py-1 rounded-lg text-xs flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-shield-virus"></i>
        <span>검역 가이드북</span>
      </button>
      <button onclick="window.toggleAudio()" id="audioBtn" class="bg-[#1a233d] hover:bg-[#253258] border border-slate-700 text-slate-300 px-3 py-1 rounded-lg text-xs flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-volume-high text-emerald-400" id="audioIcon"></i>
        <span id="audioText">음향 ON</span>

      <div id="userProfilePill" class="hidden text-xs text-slate-300 flex items-center gap-2 bg-slate-900/90 px-3 py-1 rounded-lg border border-slate-800">
        <i class="fa-solid fa-user-md text-blue-400"></i>
        <span id="loggedInUserName" class="font-bold">계정 연동 필요</span>
        <button onclick="window.handleLogout()" class="text-rose-400 hover:text-rose-300 ml-1 font-bold underline text-[10px]">로그아웃</button>
      </div>
    </div>
  </div>
</header>

<main class="flex-grow max-w-5xl w-full mx-auto px-4 py-4 flex flex-col gap-4">
  
  <div class="bg-[#111a36] border border-[#22315d] rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 shadow-xl">
    <div class="flex items-center gap-3">
      <div class="bg-[#1c2541] text-blue-400 text-xs font-bold px-3 py-2 rounded-xl border border-[#2e3e60]">
        <span class="text-slate-400 mr-1">STAGE</span>
        <span id="info" class="text-sm text-blue-300">로그인 필요</span>
      </div>
      <div>
        <div class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold flex items-center gap-1.5">
          <span>훈련 소요 시간</span>
          <span id="timerDisplay" class="text-blue-300 font-mono font-bold">00:00</span>
        </div>
        <div class="w-32 bg-slate-800 h-1.5 rounded-full overflow-hidden mt-1">
          <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-emerald-400 h-full w-0 transition-all duration-300"></div>
        </div>
      </div>
    </div>
    
    <div class="flex items-center gap-2" id="playControlGroup">
      <button onclick="window.togglePause()" id="pauseBtn" class="hidden bg-[#22315d] hover:bg-[#344883] text-slate-200 text-xs px-3.5 py-1.5 rounded-lg font-bold border border-[#3b4e85] transition-all">
        <i class="fa-solid fa-pause mr-1"></i>일시정지
      </button>
      <button onclick="window.stopGame()" id="stopBtn" class="hidden bg-rose-950/60 hover:bg-rose-900/60 text-rose-300 text-xs px-3.5 py-1.5 rounded-lg font-bold border border-rose-800 transition-all">
        <i class="fa-solid fa-stop mr-1"></i>정지
      </button>
    </div>

    <div class="flex items-center gap-4 text-xs">
      <div class="text-right">
        <p class="text-[10px] text-slate-400">정화 수치</p>
        <p class="text-base font-bold text-emerald-400" id="hudScore">0 <span class="text-[10px] text-slate-500">개</span></p>
      </div>
      <div class="w-px h-6 bg-slate-800"></div>
      <div class="text-right">
        <p class="text-[10px] text-slate-400">오염 위반</p>
        <p class="text-base font-bold text-rose-400" id="hudWrong">0 <span class="text-[10px] text-slate-500">회</span></p>
      </div>
    </div>
  </div>

  <div id="gameBox" class="relative w-full h-[520px] bg-[#0c1020] border-2 border-[#1e294b] rounded-2xl overflow-hidden shadow-2xl flex flex-col justify-center items-center p-6">
    <!-- Active Stage contents injected dynamically -->
  </div>

  <div class="flex items-center justify-between gap-4">
    <button onclick="window.resetGame()" class="text-xs text-slate-400 hover:text-rose-400 flex items-center gap-1.5 bg-[#111a36] border border-slate-800 px-4 py-2 rounded-xl hover:bg-slate-900 transition-colors">
      <i class="fa-solid fa-arrow-rotate-left"></i> 처음부터 다시 시작
    </button>
    <button onclick="window.nextStage()" id="nextBtn" disabled class="bg-[#1b2a47] text-slate-400 cursor-not-allowed border border-[#2e3e60] py-2 px-6 rounded-xl font-bold flex items-center gap-1.5 transition-all shadow-lg">
      <span>다음 단계 관문</span> <i class="fa-solid fa-arrow-right"></i>
    </button>
  </div>

</main>

<div id="guideModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85">
  <div class="bg-[#111a36] border border-blue-500/30 rounded-2xl max-w-2xl w-full p-6 shadow-2xl space-y-4">
    <div class="flex items-center justify-between border-b border-[#22315d] pb-3">
      <div class="flex items-center gap-2 text-blue-400">
        <i class="fa-solid fa-shield-virus text-lg"></i>
        <h3 class="font-black text-white text-sm">의료기록 검역 가이드라인 및 표준</h3>
      </div>
      <button onclick="window.closeGuideModal()" class="text-slate-400 hover:text-white transition-colors">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <div class="flex gap-2 border-b border-slate-800 pb-2">
      <button id="guideTab1" onclick="window.switchGuideTab(1)" class="text-xs font-bold text-blue-400 border-b-2 border-blue-400 pb-1 px-1">SOAP 구조 규칙</button>
      <button id="guideTab2" onclick="window.switchGuideTab(2)" class="text-xs font-bold text-slate-400 pb-1 px-1">모호한 표현 식별법</button>
      <button id="guideTab3" onclick="window.switchGuideTab(3)" class="text-xs font-bold text-slate-400 pb-1 px-1">원내 금기 의학 용어</button>
    </div>

    <div id="guideBody" class="space-y-3 text-xs text-slate-300 max-h-[300px] overflow-y-auto custom-scrollbar pr-1 leading-relaxed">
      <!-- Dynamic Injection -->
    </div>

    <div class="flex justify-end pt-2 border-t border-[#22315d]">
      <button onclick="window.closeGuideModal()" class="bg-[#1c2541] hover:bg-[#2d3a63] text-slate-300 font-bold px-4 py-1.5 rounded-lg text-xs transition-colors">
        닫기
      </button>
    </div>
  </div>
</div>

<!-- Offscreen container for printing High-fidelity and capturing PNGs -->
<div id="certificate-container"></div>

<script>
const appId = "soap-clinical-learning-v3";
const fallbackFirebaseConfig = {
  apiKey: "AIzaSyAsFakeKey_JustForInitializationSafeMode",
  authDomain: "soap-clinical-learning.firebaseapp.com",
  projectId: "soap-clinical-learning",
  storageBucket: "soap-clinical-learning.appspot.com",
  messagingSenderId: "1234567890",
  appId: "1:1234:web:1234"
};

let db = null;
let auth = null;
let isSandboxMode = false;

/* GAME STATE */
let authMode = 'login'; 
let currentUserProfile = null;
let stage = 1;
let score = 0;
let wrong = 0;
let challengeCount = 1; // "도전 횟수"
let totalElapsedTime = 0;
let timerInterval = null;
let isPaused = false;

/* GAME LOOP CONTROLS */
let spawnInterval = null;
let animationFrameId = null;
let activeItems = [];
let targetPurgeCount = 8; // Stage 1 target
let currentStagePurges = 0;

/* SHUFFLE DECK GAME SYSTEM */
let stageDrawPile = [];
let recentSpawns = []; // Buffer size: 15

/* EMERGENCY MODE CONTROLS */
let isEmergencyActive = false;
let emergencyTimer = null;
let emergencyTriggeredCount = 0;

/* ATTEMPT HISTORIES */
let allAttempts = [];
let currentAttempt = null;

/* CLINICAL DATABASE LOGS */
let sessionDataLog = []; 

/* SOUND EFFECTS */
let synth = null;
let soundEnabled = true;

// Active tracking for Stage 4 and Stage 5 mistakes for report binding
let stage4Results = [];
let stage5Results = [];

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// 1~3단계 전체에서 하나의 통합 덱을 사용하도록 구조 개선
function initializeStageDeck() {
  stageDrawPile = [];
  
  // 모든 바이러스를 하나의 마스터 리스트로 병합 (전체 57개)
  const allViruses = [
    ...vagueClinicalItems.map(item => ({ ...item, isVirus: true, cat: "모호한 표현" })),
    ...forbiddenAbbreviationItems.map(item => ({ ...item, isVirus: true, cat: "금기약어" })),
    ...repetitiveRecordItems.map(item => ({ ...item, isVirus: true, cat: "반복기록" }))
  ];
  
  // 동일한 개수(57개)만큼의 올바른 표준 기록을 무작위 선출하여 50:50으로 병합
  let correctPool = [...correctClinicalItems].map(item => ({ ...item, isVirus: false, cat: "표준기록" }));
  shuffleArray(correctPool);
  let selectedCorrect = correctPool.slice(0, allViruses.length);
  
  stageDrawPile = [...allViruses, ...selectedCorrect];
  shuffleArray(stageDrawPile);
  recentSpawns = []; // 중복 제한 큐 초기화
}

function initAudio() {
  if (!synth) {
    try {
      synth = new Tone.Synth().toDestination();
    } catch (e) {
      console.warn("Audio synth load bypassed:", e);
    }
  }
}

window.onload = function() {
  initializeDatabaseEngine();
};

function initializeDatabaseEngine() {
  const badge = document.getElementById("dbStatusBadge");
  const textVal = document.getElementById("dbStatusText");

  try {
    const hasConfig = (typeof __firebase_config !== 'undefined' && __firebase_config);
    const configToUse = hasConfig ? JSON.parse(__firebase_config) : fallbackFirebaseConfig;

    if (!firebase.apps.length) {
      firebase.initializeApp(configToUse);
    }
    
    db = firebase.firestore();
    auth = firebase.auth();
    
    if (configToUse.apiKey.includes("FakeKey")) {
      throw new Error("Sandbox Mode Activation");
    }

    badge.className = "text-[9px] px-2 py-0.5 rounded border font-semibold flex items-center gap-1 bg-emerald-950/60 border-emerald-800 text-emerald-400";
    textVal.innerText = "클라우드 동기화 완료";
    isSandboxMode = false;
  } catch (err) {
    console.log("Firebase default fallback safe modes active.");
    isSandboxMode = true;
    badge.className = "text-[9px] px-2 py-0.5 rounded border font-semibold flex items-center gap-1 bg-amber-950/60 border-amber-800 text-amber-400";
    textVal.innerText = "로컬 샌드박스 가동";
  }

  if (!isSandboxMode && auth) {
    auth.onAuthStateChanged((user) => {
      handleAuthStateTransition(user);
    });
  } else {
    renderAuthSelection();
  }
}

function generateVirtualEmail(name) {
  let safeHex = "";
  for (let i = 0; i < name.length; i++) {
    safeHex += name.charCodeAt(i).toString(16);
  }
  return `user_${safeHex}@soap-clinical.com`;
}

async function handleAuthStateTransition(user) {
  if (user) {
    const box = document.getElementById("gameBox");
    box.innerHTML = `
      <div class="text-center text-slate-400 text-xs flex flex-col items-center gap-2">
        <i class="fa-solid fa-circle-notch animate-spin text-2xl text-blue-400"></i>
        <span>임상 연동 상태 확인 중...</span>
      </div>
    `;

    try {
      let profileData = null;
      if (!isSandboxMode) {
        const docSnap = await db.collection("artifacts").doc(appId).collection("users").doc(user.uid).get();
        if (docSnap.exists) {
          profileData = docSnap.data();
        }
      }

      if (!profileData) {
        const cached = localStorage.getItem(`soap_user_cache_${user.uid}`);
        if (cached) {
          profileData = JSON.parse(cached);
        } else {
          profileData = { userName: "지정 안 됨", userAlias: "의료 마스터" };
        }
      }

      currentUserProfile = profileData;
      document.getElementById("loggedInUserName").innerText = `${currentUserProfile.userName} (${currentUserProfile.userAlias})`;
      document.getElementById("userProfilePill").classList.remove("hidden");
      
      loadAttemptsData();
      renderDashboard();

    } catch (e) {
      console.error("[AUTH STATS ERR]", e);
      renderAuthSelection();
    }
  } else {
    currentUserProfile = null;
    document.getElementById("userProfilePill").classList.add("hidden");
    renderAuthSelection();
  }
}

function loadAttemptsData() {
  if (!currentUserProfile) return;
  const storageKey = `soap_attempts_${currentUserProfile.userName.toLowerCase()}`;
  const raw = localStorage.getItem(storageKey);
  allAttempts = raw ? JSON.parse(raw) : [];
}

function saveAttemptRecord(attemptObj) {
  if (!currentUserProfile) return;
  allAttempts.push(attemptObj);
  const storageKey = `soap_attempts_${currentUserProfile.userName.toLowerCase()}`;
  localStorage.setItem(storageKey, JSON.stringify(allAttempts));
}

window.handleAuthAction = async function() {
  const nameInput = document.getElementById("authUserName").value.trim();
  const passwordInput = document.getElementById("authPassword").value.trim();
  const aliasInput = document.getElementById("authUserAlias") ? document.getElementById("authUserAlias").value.trim() : "";

  if (!nameInput || !passwordInput) {
    showTopAlert("성명과 비밀번호를 기입해 주십시오.", false);
    return;
  }
  if (authMode === 'register' && !aliasInput) {
    showTopAlert("의료진 별명을 입력해 주세요.", false);
    return;
  }
  if (passwordInput.length < 6) {
    showTopAlert("보안을 위해 비밀번호는 최소 6자 이상이어야 합니다.", false);
    return;
  }

  const virtualEmail = generateVirtualEmail(nameInput);

  try {
    if (isSandboxMode) {
      const storageKey = `soap_sandbox_user_${nameInput.toLowerCase()}`;
      if (authMode === 'register') {
        if (localStorage.getItem(storageKey)) {
          showTopAlert("이미 등록된 의료진성명입니다.", false);
          return;
        }
        const profile = { userName: nameInput, userAlias: aliasInput, password: passwordInput, registeredAt: new Date().toISOString() };
        localStorage.setItem(storageKey, JSON.stringify(profile));
        currentUserProfile = profile;
        showTopAlert(`가입 환영합니다, ${nameInput} 의료진님!`, true);
      } else {
        const localData = localStorage.getItem(storageKey);
        if (!localData) {
          showTopAlert("등록되지 않은 성명입니다. 신규 의료진 등록을 해주십시오.", false);
          return;
        }
        const profile = JSON.parse(localData);
        if (profile.password !== passwordInput) {
          showTopAlert("비밀번호 불일치! 정보를 재점검해 주십시오.", false);
          return;
        }
        currentUserProfile = profile;
        showTopAlert(`복귀를 환영합니다: ${currentUserProfile.userName} 의료진님`, true);
      }
      
      document.getElementById("loggedInUserName").innerText = `${currentUserProfile.userName} (${currentUserProfile.userAlias})`;
      document.getElementById("userProfilePill").classList.remove("hidden");
      loadAttemptsData();
      renderDashboard();
    } else {
      if (authMode === 'register') {
        try {
          const userCredential = await auth.createUserWithEmailAndPassword(virtualEmail, passwordInput);
          const profileData = {
            userName: nameInput,
            userAlias: aliasInput,
            registeredAt: new Date().toISOString()
          };
          
          localStorage.setItem(`soap_user_cache_${userCredential.user.uid}`, JSON.stringify(profileData));

          try {
            await db.collection("artifacts").doc(appId).collection("users").doc(userCredential.user.uid).set(profileData);
          } catch (fsErr) {
            console.error("[FS DATABASE ERR]", fsErr);
          }

          showTopAlert(`정상적으로 회원 등록 승인되었습니다. 환영합니다, ${nameInput} 의료진님!`, true);
        } catch (authErr) {
          console.log("Auth registry error code:", authErr.code);
          if (authErr.code === "auth/email-already-in-use") {
            showTopAlert("이미 등록된 의료진성명입니다.", false);
          } else {
            showTopAlert(`회원가입 실패: [${authErr.code}]`, false);
          }
          return;
        }
      } else {
        try {
          await auth.signInWithEmailAndPassword(virtualEmail, passwordInput);
          showTopAlert("인증 성공! 세션을 로드합니다.", true);
        } catch (authErr) {
          console.log("Auth login error code:", authErr.code);
          showTopAlert("일치하는 계정 정보가 없습니다. 성명 또는 패스워드를 재점검하세요.", false);
          return;
        }
      }
    }

  } catch (error) {
    showTopAlert("인증 처리 도중 오류가 식별되었습니다.", false);
  }
};

window.switchAuthTab = function(mode) {
  authMode = mode;
  const tabLogin = document.getElementById("tabLogin");
  const tabRegister = document.getElementById("tabRegister");
  const submitBtn = document.getElementById("authSubmitBtn");
  const inputsContainer = document.getElementById("authInputs");

  if (mode === 'register') {
    tabRegister.className = "text-xs font-bold text-blue-400 border-b-2 border-blue-400 pb-1.5 px-1 focus:outline-none";
    tabLogin.className = "text-xs font-bold text-slate-500 pb-1.5 px-1 focus:outline-none";
    submitBtn.innerText = "신규 의료진 라이센스 등록";
    inputsContainer.innerHTML = `

window.handleLogout = async function() {

};

function renderDashboard() {
  const box = document.getElementById("gameBox");
  box.className = "relative w-full h-[520px] bg-[#0c1020] border-2 border-[#1e294b] rounded-2xl overflow-hidden shadow-2xl flex flex-col justify-between p-6";
  
  let attemptsHTML = "";
  if (allAttempts.length === 0) {
    attemptsHTML = `
      <div class="text-center py-8 text-slate-500 text-xs italic">
        <i class="fa-solid fa-folder-open text-lg mb-1.5 block"></i>
        아직 완료된 검역 세션 이수 이력이 없습니다.
      </div>
    `;
  } else {
    attemptsHTML = allAttempts.map((att) => {
      const formattedDate = att.timestamp ? att.timestamp.split('T')[0] : '2026-06-15';
      const gradeColor = att.soap_score.grade === 'S' ? 'text-emerald-400' : (att.soap_score.grade === 'A' ? 'text-blue-400' : 'text-amber-400');
      return `
        <div onclick="window.viewHistoricalCertificate(${att.attempt_id})" class="flex items-center justify-between p-2.5 rounded-lg border border-[#22315d] bg-[#151d38] hover:bg-[#1f2a4e] cursor-pointer transition-colors text-left">
          <div class="space-y-0.5">
            <p class="text-xs font-black text-slate-200">제 ${att.attempt_id}회차 검역 이수증</p>
            <p class="text-[9px] text-slate-400">${formattedDate} | 정확도: ${att.soap_score.accuracy}% | 시간: ${att.soap_score.elapsed_time}</p>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs font-black px-2 py-0.5 rounded bg-slate-900 border border-slate-700 ${gradeColor}">${att.soap_score.grade} 등급</span>
            <i class="fa-solid fa-chevron-right text-slate-500 text-xs"></i>
          </div>
        </div>
      `;
    }).reverse().join("");
  }

  box.innerHTML = `
    <div class="w-full flex items-center justify-between border-b border-[#22315d] pb-3 mb-1">
      <div class="flex items-center gap-2.5">
        <div class="bg-emerald-950 border border-emerald-500 text-emerald-400 w-10 h-10 rounded-xl flex items-center justify-center text-lg shadow">
          <i class="fa-solid fa-stethoscope"></i>
        </div>
        <div class="text-left">
          <h3 class="text-xs font-black text-white">${currentUserProfile.userName} 의료진의 포털</h3>
          <p class="text-[9px] text-slate-400">SOAP 의료기록 표준 교육 세션 및 역대 자격 수여 기록</p>
        </div>
      </div>
      <div class="text-right text-[10px]">
        <span class="text-slate-400 block">총 누적 훈련</span>
        <strong class="text-white font-mono">도전 횟수: ${allAttempts.length}회 이수 완료</strong>
      </div>
    </div>

    <div class="w-full flex-grow overflow-y-auto custom-scrollbar space-y-2 my-2 pr-1" style="max-height: 280px;">
      <h4 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest text-left mb-1">내 역대 검역 세션 이수증</h4>
      ${attemptsHTML}
    </div>

    <div class="w-full grid grid-cols-2 gap-3 pt-2 border-t border-[#22315d]">
      <button onclick="window.startGame()" class="w-full bg-gradient-to-r from-blue-500 to-emerald-500 hover:from-blue-600 hover:to-emerald-600 text-slate-950 font-black text-xs py-2.5 rounded-xl transition-all shadow-md flex items-center justify-center gap-1.5">
        <i class="fa-solid fa-play"></i> 신규 검역 세션 수립
      </button>
      <button onclick="window.openGuideModal()" class="w-full bg-[#1b2541] hover:bg-[#28375e] border border-[#2d3e6d] text-slate-300 font-bold text-[11px] py-2.5 rounded-xl transition-all">
        <i class="fa-solid fa-book-medical mr-1"></i> 기록 표준 사전 탐색
      </button>
    </div>
  `;
  stage = 1;
  updateHUD();
}

window.openGuideModal = function() {
  document.getElementById("guideModal").classList.remove("hidden");
  window.switchGuideTab(1);
};

window.closeGuideModal = function() {
  document.getElementById("guideModal").classList.add("hidden");
};

window.switchGuideTab = function(tabIdx) {
  const t1 = document.getElementById("guideTab1");
  const t2 = document.getElementById("guideTab2");
  const t3 = document.getElementById("guideTab3");
  const gBody = document.getElementById("guideBody");

  t1.className = "text-xs font-bold text-slate-400 pb-1 px-1";
  t2.className = "text-xs font-bold text-slate-400 pb-1 px-1";
  t3.className = "text-xs font-bold text-slate-400 pb-1 px-1";

  document.getElementById(`guideTab${tabIdx}`).className = "text-xs font-bold text-blue-400 border-b-2 border-blue-400 pb-1 px-1";
  gBody.innerHTML = guideData[tabIdx];

function showTopAlert(message, isSuccess = true) {
  const existingAlert = document.getElementById("topFeedbackAlert");
  if (existingAlert) existingAlert.remove();

  const alertContainer = document.createElement("div");
  alertContainer.id = "topFeedbackAlert";
  alertContainer.className = `absolute top-14 left-4 right-4 z-40 px-3.5 py-2.5 rounded-xl border text-xs font-bold transition-all duration-300 flex items-center gap-2 shadow-lg ${
    isSuccess ? "bg-emerald-950/95 border-emerald-500 text-emerald-300" : "bg-rose-950/95 border-rose-500 text-rose-300"
  }`;
  
  alertContainer.innerHTML = isSuccess 
    ? `<i class="fa-solid fa-check-circle text-emerald-400"></i> ${message}`
    : `<i class="fa-solid fa-triangle-exclamation text-rose-400"></i> ${message}`;
  
  const box = document.getElementById("gameBox");
  box.appendChild(alertContainer);

  setTimeout(() => {
    if (alertContainer) alertContainer.remove();
  }, 1800);
}

window.toggleAudio = function() {
  soundEnabled = !soundEnabled;
  const icon = document.getElementById("audioIcon");
  const text = document.getElementById("audioText");
  if (soundEnabled) {
    icon.className = "fa-solid fa-volume-high text-emerald-400";
    text.innerText = "음향 ON";
  } else {
    icon.className = "fa-solid fa-volume-xmark text-slate-500";
    text.innerText = "음향 OFF";
  }
};

function playSuccessSound() {
  if (!soundEnabled) return;
  initAudio();
  if (synth) {
    try { Tone.start(); synth.triggerAttackRelease("E5", "16n"); } catch(e){}
  }
}

function playErrorSound() {
  if (!soundEnabled) return;
  initAudio();
  if (synth) {
    try { Tone.start(); synth.triggerAttackRelease("A2", "8n"); } catch(e){}
  }
}

function playQuizPassSound() {
  if (!soundEnabled) return;
  initAudio();
  if (synth) {
    try {
      Tone.start();
      const poly = new Tone.PolySynth().toDestination();
      poly.triggerAttackRelease(["E4", "A4", "C5", "E5"], "4n");
    } catch(e){}
  }
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!isPaused) {
      totalElapsedTime++;
      const min = String(Math.floor(totalElapsedTime / 60)).padStart(2, '0');
      const sec = String(totalElapsedTime % 60).padStart(2, '0');
      document.getElementById("timerDisplay").innerText = `${min}:${sec}`;
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

window.startGame = function() {
  if (spawnInterval) clearInterval(spawnInterval);
  cancelAnimationFrame(animationFrameId);
  isPaused = false;
  
  const box = document.getElementById("gameBox");
  box.innerHTML = "";
  box.classList.remove("emergency-border");
  
  document.getElementById("pauseBtn").classList.remove("hidden");
  document.getElementById("stopBtn").classList.remove("hidden");
  
  if (stage === 1) {
    targetPurgeCount = 8;
  } else if (stage === 2 || stage === 3) {
    targetPurgeCount = 10;
  }

  // 1~3단계 전체에서 하나의 덱만 유지하여 동일 문항 반복을 원천 차단
  if (stage === 1 && currentStagePurges === 0) {
    score = 0;
    wrong = 0;
    totalElapsedTime = 0;
    sessionDataLog = [];
    emergencyTriggeredCount = 0;
    stage4Results = [];
    stage5Results = [];
    
    // 세션 시작 시 한 번 114장의 덱을 무작위 셔플하여 빌드
    initializeStageDeck();
    
    const nextAttemptId = allAttempts.length + 1;
    currentAttempt = {
      attempt_id: nextAttemptId,
      score: 0,
      wrong_count: 0,
      missed_items: [],
      wrong_items: [],
      soap_score: {},
      timestamp: new Date().toISOString()
    };
  }
  
  startTimer();
  updateHUD();
  disableNextButton();

  activeItems = [];

  // 단계별 하강 속도 및 출현 주기 설정 (20~30% 느려진 마스터 속도 적용)
  let baseSpeed = 0.65; // 1단계 느린 속도
  let spawnTime = 2200; // 1단계 여유로운 출현 주기

  if (stage === 2) {
    baseSpeed = 1.25; // 2단계 빠른 속도
    spawnTime = 1600; // 타이트한 출현 주기
  } else if (stage === 3) {
    baseSpeed = 1.25; // 3단계 빠른 속도
    spawnTime = 1100; // 극도로 조밀한 출현 주기 (다중 낙하 효과)
  }

  const goalHeader = document.createElement("div");
  goalHeader.className = "absolute top-3 left-3 right-3 z-30 bg-slate-900/95 border border-[#22315d] p-2.5 rounded-xl flex items-center justify-between text-[11px]";
  goalHeader.innerHTML = `
    <span class="text-slate-300 font-medium">
      <i class="fa-solid fa-virus-slash text-blue-400 mr-1"></i>
      기록 바이러스(모호한 표현, 금기약어, 복붙)만 격파하십시오!
    </span>
    <span class="bg-[#1c2541] border border-blue-800 text-blue-300 px-2.5 py-0.5 rounded-lg font-black" id="goalIndicator">
      정화 상황: ${currentStagePurges} / ${targetPurgeCount}
    </span>
  `;
  box.appendChild(goalHeader);

  function triggerEmergencyMode() {
    if (isEmergencyActive) return;
    isEmergencyActive = true;
    playErrorSound();
    
    document.getElementById("gameBox").classList.add("emergency-border");
    showTopAlert("🚨 응급 상황! 약 15초간 기록 바이러스 하강 속도가 증가합니다!", false);
    
    emergencyTimer = setTimeout(() => {
      isEmergencyActive = false;
      document.getElementById("gameBox").classList.remove("emergency-border");
      showTopAlert("🚨 응급 상황 해제. 표준 유속으로 복귀합니다.", true);
    }, 15000);
  }

  function spawnFallingCapsule() {
    if (isPaused) return;
    if (currentStagePurges >= targetPurgeCount) return;

    if (stageDrawPile.length === 0) {
      // 혹시라도 114개 카드가 전부 바닥나면 덱을 다시 빌드하여 셔플
      initializeStageDeck();
    }

    // 최근 15개 출제 목록(`recentSpawns`)에 포함되지 않고, 현재 화면(`activeItems`)에도 없는 유일한 카드 탐색
    let selectedIndex = -1;
    for (let i = 0; i < stageDrawPile.length; i++) {
      let candidate = stageDrawPile[i];
      let isRecent = recentSpawns.includes(candidate.text);
      let isOnScreen = activeItems.some(item => item.data.text === candidate.text);
      
      if (!isRecent && !isOnScreen) {
        selectedIndex = i;
        break;
      }
    }

    // 버퍼 조건에 부합하는 카드가 일시적으로 없을 경우, 화면 중복 조건만 적용해 추출
    if (selectedIndex === -1) {
      for (let i = 0; i < stageDrawPile.length; i++) {
        let candidate = stageDrawPile[i];
        let isOnScreen = activeItems.some(item => item.data.text === candidate.text);
        if (!isOnScreen) {
          selectedIndex = i;
          break;
        }
      }
    }

    if (selectedIndex === -1) {
      selectedIndex = 0; // 최악의 상황 대비 폴백
    }

    let data = stageDrawPile.splice(selectedIndex, 1)[0];
    const isVirus = data.isVirus;

    // 최근 출제 문항 15개 버퍼 업데이트
    recentSpawns.push(data.text);
    if (recentSpawns.length > 15) {
      recentSpawns.shift();
    }

    const cap = document.createElement("div");
    cap.className = "falling-capsule absolute z-20 p-3 select-none cursor-pointer transition-transform duration-100 ease-linear";
    cap.innerHTML = `
      <div class="px-3.5 py-2.5 rounded-xl border border-blue-500/30 bg-[#151c33] text-slate-200 font-bold text-xs shadow-lg flex items-center gap-1.5 hover:border-blue-400 hover:bg-[#1c2747]">
        <i class="fa-solid fa-capsules text-blue-400/80 text-[10px]"></i>
        <span>${data.text}</span>
      </div>
    `;

    const boxWidth = box.clientWidth || 600;
    const initialX = Math.random() * (boxWidth - 190);
    const initialY = 35; 

    cap.style.left = `${initialX}px`;
    cap.style.transform = `translate3d(0px, ${initialY}px, 0px)`;
    box.appendChild(cap);

    const capObj = {
      element: cap,
      x: initialX,
      y: initialY,
      speed: baseSpeed + (Math.random() * 0.22),
      isVirus: isVirus,
      data: data,
      clicked: false
    };

    cap.onpointerdown = (e) => {
      e.preventDefault();
      if (isPaused || capObj.clicked) return;
      capObj.clicked = true;

      const innerDiv = cap.querySelector('div');

      if (capObj.isVirus) {
        score++;
        currentStagePurges++;
        playSuccessSound();

        innerDiv.className = "px-3.5 py-2.5 rounded-xl border border-emerald-500 bg-emerald-950 text-emerald-200 text-xs font-black scale-105 flex items-center gap-1.5 shadow-md";
        innerDiv.innerHTML = `<i class="fa-solid fa-shield-virus text-emerald-400 animate-pulse"></i> ${data.text} [정화]`;

        showTopAlert(`성공: "${data.text}" 정화 수치 확보`, true);
        
        sessionDataLog.push({
          stage: stage,
          text: data.text,
          type: "wrong",
          action: "removed",
          correct_answer: "remove",
          user_answer: "정화클릭",
          is_duplicate_mistake: false
        });

        setTimeout(() => { cap.remove(); }, 600);

        const goalInd = document.getElementById("goalIndicator");
        if (goalInd) goalInd.innerText = `정화 상황: ${currentStagePurges} / ${targetPurgeCount}`;

        // Stage 2 & 3 Emergency Trigger Checks
        if (stage === 2 && currentStagePurges === 4 && emergencyTriggeredCount === 0) {
          emergencyTriggeredCount++;
          triggerEmergencyMode();
        } else if (stage === 3 && (currentStagePurges === 3 || currentStagePurges === 7) && emergencyTriggeredCount < 2) {
          emergencyTriggeredCount++;
          triggerEmergencyMode();
        }

        if (currentStagePurges >= targetPurgeCount) {
          endFallingSequence();
        }
      } else {
        wrong++;
        playErrorSound();

        innerDiv.className = "px-3.5 py-2.5 rounded-xl border border-rose-500 bg-rose-950 text-rose-200 text-xs font-black scale-105 flex items-center gap-1.5 shadow-md";
        innerDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-rose-400"></i> ${data.text} [위반]`;

        showTopAlert(`위반: "${data.text}"는 완벽한 임상 표준 기록입니다!`, false);

        const explanationStr = data.detail || "표준 정량 표기 기재법";
        currentAttempt.wrong_items.push({ text: data.text, explanation: explanationStr });

        sessionDataLog.push({
          stage: stage,
          text: data.text,
          type: "correct",
          action: "wrong_click",
          correct_answer: "keep",
          user_answer: "정화시도",
          is_duplicate_mistake: false
        });

        setTimeout(() => { cap.remove(); }, 600);
      }

      updateHUD();
      activeItems = activeItems.filter(item => item !== capObj);
    };

    activeItems.push(capObj);
  }

  function updateFrames() {
    if (isPaused) {
      animationFrameId = requestAnimationFrame(updateFrames);
      return;
    }

    const boxHeight = box.clientHeight || 520;
    const speedMult = isEmergencyActive ? 1.7 : 1.0;

    activeItems.forEach(item => {
      item.y += (item.speed * speedMult);
      item.element.style.transform = `translate3d(0px, ${item.y}px, 0px)`;

      // If item touches baseline
      if (item.y > boxHeight - 50) {
        if (item.isVirus && !item.clicked) {
          wrong++;
          playErrorSound();
          showTopAlert(`경보! 기록 바이러스 "${item.data.text}" 정밀 검역 실패!`, false);
          
          const expText = item.data.reason || "모호한 임상 기재";
          currentAttempt.missed_items.push({ text: item.data.text, explanation: expText });

          sessionDataLog.push({
            stage: stage,
            text: item.data.text,
            type: "wrong",
            action: "not_removed",
            correct_answer: "remove",
            user_answer: "방치함",
            is_duplicate_mistake: false
          });
          
          updateHUD();
        }
        
        item.element.classList.add("opacity-0");
        setTimeout(() => { item.element.remove(); }, 300);
        item.clicked = true;
      }
    });

    activeItems = activeItems.filter(item => !item.clicked && item.y <= boxHeight - 50);
    animationFrameId = requestAnimationFrame(updateFrames);
  }

  spawnFallingCapsule();
  spawnInterval = setInterval(spawnFallingCapsule, spawnTime);
  updateFrames();

  function endFallingSequence() {
    clearInterval(spawnInterval);
    cancelAnimationFrame(animationFrameId);
    activeItems.forEach(item => item.element.remove());
    activeItems = [];
    
    if (isEmergencyActive) {
      isEmergencyActive = false;
      document.getElementById("gameBox").classList.remove("emergency-border");
      if (emergencyTimer) clearTimeout(emergencyTimer);
    }
    
    enableNextButton();
  }
};

function updateHUD() {
  document.getElementById("hudScore").innerText = score;
  document.getElementById("hudWrong").innerText = wrong;

  const bar = document.getElementById("progressBar");
  const percentage = (stage / 6) * 100;
  bar.style.width = percentage + "%";
  
  let stageName = "";
  if (stage === 1) stageName = "1단계: 모호한 기록 정화";
  else if (stage === 2) stageName = "2단계: 금기 약어 제거";
  else if (stage === 3) stageName = "3단계: 복합 의료 검역";
  else if (stage === 4) stageName = "4단계: 자가 오류 O/X 판단";
  else if (stage === 5) stageName = "5단계: SOAP 평가(A) 검정";
  else if (stage === 6) stageName = "6단계: 자격증 리포트 완성";
  
  document.getElementById("info").innerText = stageName;
}

  updateHUD();

  document.getElementById("stopBtn").className = "hidden";

  const userMistakes = sessionDataLog.filter(item => item.action === "wrong_click" || item.action === "not_removed");

  const uniqueTexts = new Set();
  const uniqueMistakes = [];

  userMistakes.forEach(item => {
    if (!uniqueTexts.has(item.text)) {
      uniqueTexts.add(item.text);
      uniqueMistakes.push(item);
    }
  });

  if (uniqueMistakes.length > 0) {
    stage4Questions = uniqueMistakes.map(item => {
      const originalVague = vagueClinicalItems.find(x => x.text === item.text);
      const originalForbidden = forbiddenAbbreviationItems.find(x => x.text === item.text);
      const originalRepetitive = repetitiveRecordItems.find(x => x.text === item.text);
      const originalCorrect = correctClinicalItems.find(x => x.text === item.text);
      
      const matchedInfo = originalVague || originalForbidden || originalRepetitive || originalCorrect;
      
      return {
        text: item.text,
        isVirus: item.type === "wrong", 
        reason: matchedInfo ? (matchedInfo.reason || matchedInfo.detail) : "정량 표기 기재 지표",
        cat: item.action === "wrong_click" ? "표준기록 오판교정" : "미정화 오류",

function showStage5Quiz() {
  updateHUD();
  const box = document.getElementById("gameBox");
  box.innerHTML = "";
  
  let poolCopy = [...stage5QuestionsPool];
  stage5Questions = [];
  
  // 30개 풀에서 무작위로 10개 문제 추출 및 선택지 셔플
  const totalStage5Target = 10;
  for (let i = 0; i < totalStage5Target; i++) {
    if (poolCopy.length === 0) break;
    const randIdx = Math.floor(Math.random() * poolCopy.length);
    const qRaw = poolCopy.splice(randIdx, 1)[0];
    
    let opts = [...qRaw.options];
    for (let j = opts.length - 1; j > 0; j--) {
      const k = Math.floor(Math.random() * (j + 1));
      [opts[j], opts[k]] = [opts[k], opts[j]];
    }
    
    const correctIndex = opts.indexOf(qRaw.correct);
    
    stage5Questions.push({
      s: qRaw.s,
      o: qRaw.o,
      options: opts,
      answer: correctIndex,
      tip: qRaw.tip,
      correctText: qRaw.correct
    });
  }
  
  stage5Index = 0;
  stage5Results = [];
  renderStage5Card();
}

function compileAndSaveAttemptResult() {
  stopTimer();
  
  const totalQuestions = stage4Questions.length + stage5Questions.length;
  const totalCorrect = (stage4Questions.length - stage4Results.length) + (stage5Questions.length - stage5Results.length);
  const accuracyPercentage = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 100;

  let finalGrade = "C";
  if (accuracyPercentage >= 95) finalGrade = "S";
  else if (accuracyPercentage >= 90) finalGrade = "A";
  else if (accuracyPercentage >= 80) finalGrade = "B";

  currentAttempt.score = score;
  currentAttempt.wrong_count = wrong;
  currentAttempt.soap_score = {
    stage1_cleared: true,
    stage2_cleared: true,
    stage3_cleared: true,
    stage4_correct: stage4Questions.length - stage4Results.length,
    stage4_total: stage4Questions.length,
    stage5_correct: stage5Questions.length - stage5Results.length,
    stage5_total: stage5Questions.length,
    accuracy: accuracyPercentage,
    grade: finalGrade,
    elapsed_time: `${Math.floor(totalElapsedTime / 60)}분 ${totalElapsedTime % 60}초`
  };

  currentAttempt.stage4_wrongs = [...stage4Results];
  currentAttempt.stage5_wrongs = [...stage5Results];

  saveAttemptRecord(currentAttempt);
  
  if (!isSandboxMode && auth.currentUser) {
    try {
      db.collection("artifacts").doc(appId).collection("users").doc(auth.currentUser.uid).collection("attempts").add(currentAttempt);
    } catch(err) {
      console.warn("Cloud attempt synchronization postponed:", err);
    }
  }

  showCompletedCertificate(currentAttempt);
}

window.generateHighFidelityPNG = async function(attemptId) {
  const att = allAttempts.find(a => a.attempt_id === attemptId);
  if (!att) {
    showTopAlert("지정 회차 데이터를 인출하지 못했습니다.", false);
    return;
  }
  
  preparePrintSourceHTML(att);
  const element = document.getElementById("certificate-container");

  const finalName = currentUserProfile ? currentUserProfile.userName : "홍길동";
  const finalAlias = currentUserProfile ? currentUserProfile.userAlias : "SOAP마스터";

  const certificateData = {
    userName: finalName,
    userAlias: finalAlias,
    score: att.score,
    grade: att.soap_score.grade,
    accuracy: att.soap_score.accuracy,
    stage4_result: `${att.soap_score.stage4_correct}/${att.soap_score.stage4_total}`,
    stage5_result: `${att.soap_score.stage5_correct}/${att.soap_score.stage5_total}`,
    stage4_wrongs: att.stage4_wrongs || [],
    stage5_wrongs: att.stage5_wrongs || [],
    challenge_count: challengeCount
  };

  // Real-time developer diagnostic verification console logs before image compilation
  console.log("=== PNG GENERATION DIAGNOSTIC LOG ===");
  console.log("certificateData", certificateData);
  console.log("캡처 대상 요소 존재 여부 출력", element);
  if (element) {
    console.log("캡처 대상 크기 출력 - width:", element.offsetWidth, "height:", element.offsetHeight);
    console.log("실제 생성된 페이지 개수 출력", element.querySelectorAll(".certificate-page").length);
    console.log("페이지 1 존재 여부", document.getElementById("certificate-page-1"));
    console.log("페이지 2 존재 여부", document.getElementById("certificate-page-2"));
    console.log("페이지 3 존재 여부", document.getElementById("certificate-page-3"));
    console.log("페이지 2 내용 길이", document.getElementById("certificate-page-2")?.innerHTML.length || 0);
    console.log("페이지 3 내용 길이", document.getElementById("certificate-page-3")?.innerHTML.length || 0);
  }

  if (!element.innerHTML || element.innerHTML.trim() === "") {
    showTopAlert("경고: 이미지 캔버스를 로드하지 못했습니다.", false);
    return;
  }

  // Elevate container to active painting layer to avoid layout omission
  element.style.opacity = "1";
  element.style.zIndex = "99999";
  element.style.position = "absolute";

  showTopAlert("모든 페이지를 캡처하여 고해상도 통합본을 병합 중입니다. 잠시만 기다리십시오...", true);

  setTimeout(async () => {
    try {
      const pages = element.querySelectorAll(".certificate-page");
      console.log("실제 캡처 중인 요소 크기 및 개수:", pages.length);

      if (pages.length === 0) {
        throw new Error("No certificate pages found with '.certificate-page' selector.");
      }

      const canvases = [];
      for (let i = 0; i < pages.length; i++) {
        const pageCanvas = await html2canvas(pages[i], {
          scale: 2,
          useCORS: true,
          backgroundColor: "#ffffff",
          logging: false
        });
        console.log(`페이지 [${i + 1}] canvas 생성 성공 여부 출력:`, pageCanvas);
        canvases.push(pageCanvas);
      }

      // Calculate master canvas dimensions to merge them vertically
      const maxWidth = Math.max(...canvases.map(c => c.width));
      const totalHeight = canvases.reduce((sum, c) => sum + c.height, 0);

      // Create joined master canvas
      const masterCanvas = document.createElement("canvas");
      masterCanvas.width = maxWidth;
      masterCanvas.height = totalHeight;
      const ctx = masterCanvas.getContext("2d");

      // Fill background
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, maxWidth, totalHeight);

      // Draw each page vertically with no empty space gaps
      let currentY = 0;
      for (const canvas of canvases) {
        ctx.drawImage(canvas, 0, currentY);
        currentY += canvas.height;
      }

      console.log("통합 마스터 캔버스 렌더링 완료:", masterCanvas);

      // Trigger file download
      const link = document.createElement("a");
      link.download = `SOAP_교육이수증_통합본.png`;
      link.href = masterCanvas.toDataURL("image/png");
      link.click();

      console.log("PDF generated"); // Console flag matches request specifications
      showTopAlert("이수증 통합본 이미지 다운로드가 성공적으로 호출되었습니다.", true);
    } catch (err) {
      console.error("Canvas export failed:", err);
      showTopAlert("통합본 이미지 스크린샷 렌더링에 실패했습니다.", false);
    } finally {
      // Restore offscreen layout styling
      element.style.opacity = "0.01";
      element.style.zIndex = "-9999";
      element.style.position = "fixed";

  }, 500);
